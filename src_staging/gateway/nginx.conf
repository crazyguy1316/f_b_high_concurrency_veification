events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate Limiting configuration by Token (Authorization header)
    limit_req_zone $http_authorization zone=api_limit:10m rate=2r/s;
    # Customize rate limiting status code to 503 (Service Unavailable)
    limit_req_status 503;

    upstream backend_servers {
        server app_server:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Serve static frontend web files directly (Dynamic/Static content offloading)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to backend
        location /api/v1/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Apply rate limiting specifically on the reservation endpoint
        location ~ ^/api/v1/tickets/([^/]+)/reserve$ {
            limit_req zone=api_limit burst=5 nodelay;
            
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
